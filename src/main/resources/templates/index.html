<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff7ef;
            --bg-soft: #f5f1ea;
            --surface: #ffffff;
            --surface-soft: #fffaf4;
            --ink: #2b2520;
            --muted: #7b736b;
            --line: #efe2d4;
            --accent: #ff8c4b;
            --accent-strong: #ff6a2c;
            --accent-cool: #2aa198;
            --shadow: 0 18px 50px rgba(36, 26, 18, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Manrope", sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #f1f7f4 100%);
            color: var(--ink);
            min-height: 100vh;
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 20px 60px;
            position: relative;
        }

        .page::before,
        .page::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            filter: blur(0px);
            z-index: -1;
        }

        .page::before {
            width: 260px;
            height: 260px;
            background: rgba(255, 140, 75, 0.15);
            top: -40px;
            right: 8%;
        }

        .page::after {
            width: 220px;
            height: 220px;
            background: rgba(42, 161, 152, 0.15);
            bottom: -40px;
            left: 6%;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--line);
            display: grid;
            place-items: center;
            font-family: "Space Grotesk", sans-serif;
            font-weight: 700;
            color: var(--accent);
            box-shadow: var(--shadow);
        }

        .brand-title {
            font-family: "Space Grotesk", sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .brand-sub {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .chip {
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--line);
            font-size: 0.85rem;
            color: var(--muted);
            box-shadow: var(--shadow);
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
            gap: 24px;
        }

        .card {
            background: var(--surface);
            border-radius: 26px;
            padding: 24px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }

        .eyebrow {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
        }

        h1 {
            margin: 6px 0 0;
            font-family: "Space Grotesk", sans-serif;
            font-size: 2rem;
        }

        .count-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--surface-soft);
            border: 1px solid var(--line);
            color: var(--accent);
            font-weight: 600;
        }

        .count-label {
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 500;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .field label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 8px;
            display: block;
        }

        .input-shell {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: var(--surface-soft);
            transition: all 0.2s ease;
        }

        .input-shell i {
            color: var(--muted);
        }

        .input-shell input {
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
            font-size: 0.95rem;
            color: var(--ink);
        }

        .input-shell:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255, 140, 75, 0.15);
            background: #fff;
        }

        .table-wrap {
            border: 1px solid var(--line);
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table thead th {
            text-align: left;
            padding: 14px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            background: #fff3e9;
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--line);
            transition: background 0.2s ease;
        }

        .data-table tbody tr:hover {
            background: #fff7f1;
        }

        .data-table td {
            padding: 14px 16px;
            vertical-align: middle;
        }

        .id-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 38px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #fff0e6;
            color: var(--accent);
            font-weight: 700;
            font-size: 0.85rem;
        }

        .name-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .age-pill {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            background: #eaf6f4;
            color: var(--accent-cool);
            font-weight: 600;
            font-size: 0.85rem;
        }

        .muted {
            color: var(--muted);
        }

        .center {
            text-align: center;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            border: 1px solid transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .icon-btn.edit {
            color: #d97706;
            background: #fff5e1;
            border-color: #ffe4bf;
        }

        .icon-btn.delete {
            color: #dc2626;
            background: #fff1f2;
            border-color: #ffd4d6;
        }

        .icon-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
        }

        .form-card h2 {
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .form-sub {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            border: none;
            border-radius: 16px;
            padding: 12px 16px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn.primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 10px 20px rgba(255, 140, 75, 0.3);
        }

        .btn.primary:hover {
            background: var(--accent-strong);
            transform: translateY(-1px);
        }

        .btn.ghost {
            background: #fff;
            border: 1px solid var(--line);
            color: var(--muted);
        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }

        .toast {
            background: #fff;
            border-radius: 16px;
            padding: 14px 18px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success i {
            color: #16a34a;
        }

        .toast.error i {
            color: #dc2626;
        }

        .empty-state {
            padding: 28px 10px;
            text-align: center;
            color: var(--muted);
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: rise 0.4s ease both;
            animation-delay: var(--delay, 0s);
        }

        @media (max-width: 992px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <header class="topbar fade-in" style="--delay: 0s;">
        <div class="brand">
            <div class="brand-mark">SV</div>
            <div>
                <div class="brand-title">School Manager</div>
                <div class="brand-sub">Quản lý sinh viên</div>
            </div>
        </div>
        <div class="chip">Bảng điều khiển</div>
    </header>

    <main class="layout">
        <section class="card main-card fade-in" style="--delay: 0.1s;">
            <div class="card-head">
                <div>
                    <span class="eyebrow">Danh sách</span>
                    <h1>Quản lý sinh viên</h1>
                </div>
                <div class="count-pill">
                    <span id="studentCount">0</span>
                    <span class="count-label">Học viên</span>
                </div>
            </div>

            <div class="filters">
                <div class="field">
                    <label for="searchName">Tìm theo tên</label>
                    <div class="input-shell">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchName" placeholder="Nhập tên sinh viên..." onkeyup="searchStudent()">
                    </div>
                </div>
                <div class="field">
                    <label for="searchId">ID SV</label>
                    <div class="input-shell">
                        <i class="fas fa-hashtag"></i>
                        <input type="text" id="searchId" placeholder="Nhập ID SV (1, 2, 3...)" onkeyup="searchById()">
                    </div>
                </div>
            </div>

            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID SV</th>
                            <th>Học viên</th>
                            <th>Tuổi</th>
                            <th>Email</th>
                            <th class="center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="studentTable"></tbody>
                </table>
            </div>
        </section>

        <aside class="card form-card fade-in" style="--delay: 0.2s;">
            <h2 id="formTitle">Thêm sinh viên</h2>
            <p class="form-sub">Điền thông tin cơ bản để thêm mới nhanh.</p>
            <input type="hidden" id="studentId">

            <div class="field">
                <label for="name">Họ và tên</label>
                <div class="input-shell">
                    <i class="fas fa-user"></i>
                    <input id="name" type="text" placeholder="Nhập tên sinh viên">
                </div>
            </div>

            <div class="field">
                <label for="age">Tuổi</label>
                <div class="input-shell">
                    <i class="fas fa-calendar-days"></i>
                    <input id="age" type="number" placeholder="Nhập tuổi">
                </div>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <div class="input-shell">
                    <i class="fas fa-envelope"></i>
                    <input id="email" type="email" placeholder="ten@university.edu.vn">
                </div>
            </div>

            <div class="actions">
                <button id="submitBtn" class="btn primary" onclick="saveStudent()">
                    <i class="fas fa-plus"></i> Thêm sinh viên
                </button>
                <button id="cancelBtn" class="btn ghost" onclick="cancelEdit()" style="display:none;">
                    Hủy thay đổi
                </button>
            </div>
        </aside>
    </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API = "/api/students";
let currentStudents = [];
let searchTimer = null;

function normalizeText(value) {
    return (value ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d")
        .replace(/Đ/g, "D")
        .toLowerCase();
}

function getRowNumber(idValue, fallbackIndex) {
    const match = currentStudents.find(s => s.id === idValue);
    return match && match.__rowNumber ? match.__rowNumber : fallbackIndex + 1;
}

function updateStudentCount() {
    document.getElementById("studentCount").textContent = currentStudents.length;
}

function loadStudents() {
    fetch(API)
        .then(res => res.json())
        .then(data => {
            const sorted = (data || []).slice().sort((a, b) => {
                const nameA = normalizeText(a.name);
                const nameB = normalizeText(b.name);
                if (nameA < nameB) return -1;
                if (nameA > nameB) return 1;

                const emailA = (a.email ?? "").toLowerCase();
                const emailB = (b.email ?? "").toLowerCase();
                if (emailA < emailB) return -1;
                if (emailA > emailB) return 1;

                const idA = (a.id ?? "").toLowerCase();
                const idB = (b.id ?? "").toLowerCase();
                if (idA < idB) return -1;
                if (idA > idB) return 1;
                return 0;
            });

            currentStudents = sorted.map((s, index) => ({
                ...s,
                __rowNumber: index + 1
            }));
            updateStudentCount();
            renderTable(currentStudents);
        });
}

function renderTable(data) {
    let html = "";
    if (data.length === 0) {
        html = `
            <tr>
                <td colspan="5">
                    <div class="empty-state">Không tìm thấy dữ liệu</div>
                </td>
            </tr>
        `;
    } else {
        data.forEach((s, index) => {
            const idValue = s.id ?? "";
            const safeName = (s.name ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
            const safeEmail = (s.email ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
            const ageValue = s.age ?? "";
            const rowNumber = getRowNumber(idValue, index);

            html += `
            <tr>
                <td><span class="id-pill" title="${idValue}">${rowNumber}</span></td>
                <td>
                    <div class="name-cell">
                        <span>${s.name}</span>
                    </div>
                </td>
                <td><span class="age-pill">${s.age || "--"}</span></td>
                <td class="muted">${s.email || "--"}</td>
                <td class="center">
                    <button class="icon-btn edit" title="Sửa"
                        onclick="editStudent('${idValue}', '${safeName}', '${ageValue}', '${safeEmail}')">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button class="icon-btn delete" title="Xóa"
                        onclick="deleteStudent('${idValue}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>`;
        });
    }
    document.getElementById("studentTable").innerHTML = html;
}

function saveStudent() {
    const id = document.getElementById("studentId").value;
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const ageValue = document.getElementById("age").value.trim();

    if (!name || !email) {
        showToast("Vui lòng nhập đầy đủ tên và email!", "error");
        return;
    }

    const student = {
        name: name,
        age: ageValue ? parseInt(ageValue, 10) : null,
        email: email
    };

    const url = id ? `${API}/update/${encodeURIComponent(id)}` : API;

    fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(student)
    }).then(res => {
        if (!res.ok) throw new Error("API error");
        resetForm();
        loadStudents();
        showToast(id ? "Cập nhật thành công!" : "Thêm mới thành công!", "success");
    }).catch(() => {
        showToast("Có lỗi xảy ra!", "error");
    });
}

function editStudent(id, name, age, email) {
    document.getElementById("studentId").value = id;
    document.getElementById("name").value = name;
    document.getElementById("age").value = age ?? "";
    document.getElementById("email").value = email;

    document.getElementById("formTitle").innerText = "Chỉnh sửa sinh viên";
    document.getElementById("submitBtn").innerHTML = '<i class="fas fa-save"></i> Lưu thay đổi';
    document.getElementById("cancelBtn").style.display = "inline-flex";

    const formCard = document.querySelector(".form-card");
    if (formCard) {
        formCard.scrollIntoView({ behavior: "smooth" });
    }
}

function cancelEdit() {
    resetForm();
}

function resetForm() {
    document.getElementById("studentId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("email").value = "";
    document.getElementById("formTitle").innerText = "Thêm sinh viên";
    document.getElementById("submitBtn").innerHTML = '<i class="fas fa-plus"></i> Thêm sinh viên';
    document.getElementById("cancelBtn").style.display = "none";
}

function deleteStudent(id) {
    if (confirm("Bạn có chắc chắn muốn xóa sinh viên này?")) {
        fetch(`${API}/${encodeURIComponent(id)}`, { method: "DELETE" })
            .then(res => {
                if (!res.ok) throw new Error("API error");
                loadStudents();
                showToast("Đã xóa sinh viên", "success");
            }).catch(() => {
                showToast("Không thể xóa sinh viên", "error");
            });
    }
}

function showToast(message, type = "success") {
    const container = document.getElementById("toastContainer");
    const toast = document.createElement("div");
    toast.className = `toast ${type}`;

    const icon = type === "success" ? "fa-check-circle" : "fa-exclamation-circle";
    toast.innerHTML = `
        <i class="fas ${icon}"></i>
        <div>
            <div style="font-weight: 600;">${type === "success" ? "Thành công" : "Lỗi"}</div>
            <div class="muted" style="font-size: 0.85rem;">${message}</div>
        </div>
    `;

    container.appendChild(toast);
    setTimeout(() => toast.classList.add("show"), 10);
    setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

function searchStudent() {
    const nameInput = document.getElementById("searchName");
    const idInput = document.getElementById("searchId");
    const name = nameInput.value.trim();
    idInput.value = "";

    if (searchTimer) {
        clearTimeout(searchTimer);
    }

    searchTimer = setTimeout(() => {
        if (!name) {
            renderTable(currentStudents);
            return;
        }

        const normalized = normalizeText(name);
        const filtered = currentStudents.filter(s =>
            normalizeText(s.name).includes(normalized)
        );
        renderTable(filtered);
    }, 200);
}

function searchById() {
    const id = document.getElementById("searchId").value.trim();
    document.getElementById("searchName").value = "";

    if (!id) {
        renderTable(currentStudents);
        return;
    }

    const index = parseInt(id, 10);
    if (Number.isNaN(index) || index < 1) {
        renderTable([]);
        return;
    }

    const match = currentStudents.find(s => s.__rowNumber === index);
    if (match) {
        renderTable([match]);
    } else {
        renderTable([]);
    }
}

loadStudents();
</script>
</body>
</html>
